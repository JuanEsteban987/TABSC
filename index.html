<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TABS Emoji PRO</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
}

/* PANEL IZQUIERDO */
#leftPanel{
    width:260px;
    background:#1b1b1b;
    padding:10px;
    box-sizing:border-box;
}

/* GRID DE BOTONES */
.buttonGrid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:3px;
    margin-bottom:6px;
}

/* BOTONES CUADRITOS PEQUEÑOS */
.unitBtn{
    background:#333;
    border:none;
    border-radius:5px;
    cursor:pointer;
    padding:2px;
    height:48px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:0.2s;
    color:white;
}

.unitBtn:hover{
    background:#555;
}

.unitEmoji{
    font-size:16px;
    line-height:16px;
}

.unitText{
    font-size:8px;
    margin-top:2px;
    text-align:center;
    color:#ccc;
}

/* BOTONES DE CONTROL */
.controlBtn{
    background:#333;
    border:none;
    border-radius:5px;
    cursor:pointer;
    padding:2px;
    height:48px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:12px;
    color:white;
}

.controlBtn:hover{
    background:#555;
}

canvas{
    background:#222;
    flex:1;
}

/* CREADOR */
#creatorPanel{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1b1b1b;
    padding:15px;
    display:none;
    width:360px;
    border:2px solid #555;
    max-height:90vh;
    overflow:auto;
}

input,select{
    width:100%;
    margin:4px 0;
    padding:5px;
    background:#222;
    color:white;
    border:1px solid #444;
    box-sizing:border-box;
}

#emojiGrid{
    display:flex;
    overflow-x:auto;
    gap:6px;
    padding:5px 0;
}

.emojiOption{
    font-size:22px;
    cursor:pointer;
    padding:5px;
    border-radius:6px;
}

.emojiSelected{
    background:#444;
    outline:2px solid white;
}

/* pequeño helper para labels */
.crLabel{ font-size:12px; margin-top:6px; color:#ddd; display:block; }
</style>
</head>

/* Unit class uses expanded stats and attack logic */
class Unit {
    constructor(x,y,team,data){
        this.x = x;
        this.y = y;
        this.team = team;

        // Stats
        this.hp = data.hp ?? 100;
        this.maxHp = this.hp;
        this.damage = data.damage ?? 10;
        this._origDamage = this.damage;
        this.speed = data.speed ?? 1;
        this._origSpeed = this.speed;
        this.defense = data.defense ?? 0;
        this._origDefense = this.defense;
        this.accuracy = data.accuracy ?? 100;
        this.attackSpeed = data.attackSpeed ?? 1; // attacks per second
        this.range = data.range ?? 20;
        this.crit = data.crit ?? 0; // percent
        this.iq = data.iq ?? 1;
        this.magicArmor = data.magicArmor ?? 0;

        this.emoji = data.emoji ?? "❓";
        this.weapon = data.weapon ?? "";
        this.name = data.name ?? "Unit";
        this.type = data.type ?? "neutral"; // <-- guarda el tipo

        // ability / mana
        this.ability = data.ability || null;
        this.manaMax = data.manaMax ?? data.mana ?? 0;
        this.mana = Math.min(this.manaMax, data.mana ?? this.manaMax);
        this.abilityCooldownMax = Math.max(6, Math.round((data.abilityCooldown || 5) * 60));
        this.abilityCooldown = 0;

        this.effect = null;
        this.effectTimer = 0;

        // attack cooldown measured in frames
        // convert attackSpeed (attacks/sec) to frames per attack (assuming ~60fps)
        this.attackCooldown = 0;
        this.attackCooldownMax = Math.max(6, Math.round(60 / (this.attackSpeed || 0.1)));
        this.size = 22;

        // flags & misc
        this.rebirthed = false;
        this.splitDone = false;
        this.poisonTicks = 0;
    }

    findNearestEnemy(){
        let enemies = units.filter(u => u.team !== this.team);
        if(enemies.length === 0) return null;
        let closest = null;
        let minD = Infinity;
        for(let e of enemies){
            let d = Math.hypot(e.x - this.x, e.y - this.y);
            if(d < minD){
                minD = d;
                closest = e;
            }
        }
        return {enemy: closest, dist: minD};
    }

    update(){
        if(!battleStarted) return;

        // mana regen
        if(this.manaMax > 0 && this.mana < this.manaMax) this.mana = Math.min(this.manaMax, this.mana + 0.08);
        // ability cooldown decrement
        if(this.abilityCooldown > 0) this.abilityCooldown--;
        // effect timer
        if(this.effectTimer > 0){
            this.effectTimer--;
            if(this.effectTimer === 0){
                // revert temporary buffs
                if(this.effect === 'shield'){
                    this.defense = this._origDefense;
                }
                if(this.effect === 'rage'){
                    this.damage = this._origDamage;
                    this.speed = this._origSpeed;
                }
                this.effect = null;
            }
        }

        // poison ticks
        if(this.poisonTicks && this.poisonTicks > 0){
            this.hp -= 0.12; // tick damage
            this.poisonTicks--;
        }

        let found = this.findNearestEnemy();
        if(!found || !found.enemy) return;
        let enemy = found.enemy;
        let dist = found.dist;

        // If outside range, move toward enemy (movement reduced by iq maybe)
        if(dist > this.range){
            let dx = enemy.x - this.x;
            let dy = enemy.y - this.y;
            let m = Math.hypot(dx,dy) || 1;
            this.x += (dx/m) * this.speed;
            this.y += (dy/m) * this.speed;
        } else {
            // in range -> attempt attack if cooldown ready
            if(this.attackCooldown <= 0){
                // Accuracy check
                if(Math.random()*100 <= this.accuracy){
                    // Damage calc: base = attacker's damage - defender's defense
                    let baseDamage = this.damage - (enemy.defense ?? 0);
                    if(baseDamage < 1) baseDamage = 1;

                    // Critical
                    if(Math.random()*100 < this.crit){
                        baseDamage *= 1.5;
                    }

                    // Apply defender's magicArmor (flat reduction)
                    baseDamage -= (enemy.magicArmor ?? 0);
                    if(baseDamage < 0) baseDamage = 0;

                    /* ===== BONUS ELEMENTAL ===== */
                    let atkType = this.type || "neutral";
                    let defType = enemy.type || "neutral";
                    if(elementBonus[atkType] && elementBonus[atkType][defType]){
                        baseDamage *= elementBonus[atkType][defType];
                    }

                    // Final application (ensure at least fractional damage)
                    enemy.hp -= baseDamage;

                    /* ===== HABILIDADES PASIVAS / AL GOLPEAR ===== */
                    if(this.ability){
                        // Splash damage (dragón)
                        if(this.ability === "splash"){
                            units.forEach(u=>{
                                if(u.team !== this.team && u !== enemy){
                                    let d = Math.hypot(u.x - enemy.x, u.y - enemy.y);
                                    if(d < 40) u.hp -= baseDamage * 0.4;
                                }
                            });
                        }

                        // Robo de vida (demonio)
                        if(this.ability === "lifesteal"){
                            this.hp += baseDamage * 0.35;
                            if(this.hp > this.maxHp) this.hp = this.maxHp;
                        }

                        // Espinas (gólem)
                        if(this.ability === "thorns"){
                            enemy.hp -= this.damage * 0.25;
                        }

                        // Multiataque (hidra)
                        if(this.ability === "multiattack"){
                            if(Math.random() < 0.35){
                                enemy.hp -= baseDamage * 0.8;
                            }
                        }

                        // Golpe que empuja (titán)
                        if(this.ability === "knockback"){
                            let dx = enemy.x - this.x;
                            let dy = enemy.y - this.y;
                            let m = Math.hypot(dx,dy)||1;
                            enemy.x += (dx/m)*18;
                            enemy.y += (dy/m)*18;
                        }

                        // Maldición (bruja)
                        if(this.ability === "curse"){
                            enemy.damage *= 0.85;
                        }

                        // Furia (lobo) -> pasa a efecto temporal si HP bajo
                        if(this.ability === "rage"){
                            if(this.hp < this.maxHp*0.5 && this.effect !== 'rage'){
                                this.effect='rage';
                                this.effectTimer=180;
                                this.damage *= 1.25;
                                this.speed *= 1.15;
                            }
                        }

                        // Veneno (escorpión)
                        if(this.ability === "poison"){
                            enemy.poisonTicks = Math.max(enemy.poisonTicks, 120);
                        }

                        // Regeneración (ent) -> curación al impactar
                        if(this.ability === "regen"){
                            this.hp += 0.45;
                            if(this.hp > this.maxHp) this.hp = this.maxHp;
                        }

                        // Renacer (fénix) handled on death

                        // Miedo (caballero maldito)
                        if(this.ability === "fear"){
                            enemy.speed *= 0.92;
                        }

                        // Emboscada (mímico)
                        if(this.ability === "ambush"){
                            if(Math.random() < 0.25){
                                enemy.hp -= baseDamage;
                            }
                        }

                        // División (slime)
                        if(this.ability === "split"){
                            if(this.hp < this.maxHp*0.4 && !this.splitDone){
                                this.splitDone=true;
                                units.push(new Unit(this.x+10,this.y,this.team,{
                                    name:this.name+" (hijo)", emoji:this.emoji, hp:this.maxHp*0.4, damage:this.damage*0.6, speed:this.speed, defense:this.defense, accuracy:this.accuracy, attackSpeed:this.attackSpeed, range:this.range, crit:this.crit, iq:this.iq, magicArmor:this.magicArmor, weapon:this.weapon, type:this.type
                                }));
                            }
                        }

                        // Castigo divino (ángel)
                        if(this.ability === "smite"){
                            if(Math.random() < 0.15){
                                enemy.hp -= baseDamage * 2;
                            }
                        }

                    }
                }
                // set cooldown based on attackSpeed (frames)
                this.attackCooldown = Math.max(6, Math.round(60 / (this.attackSpeed || 0.1)));
            }
        }

        // HABILIDADES ACTIVAS (automáticas) - se activan si hay mana y cooldown listo
        if(this.ability && this.mana >= 10 && this.abilityCooldown <= 0){

            // Fireball (zona)
            if(this.ability === "fireball"){
                units.forEach(u=>{
                    if(u.team !== this.team){
                        let d=Math.hypot(u.x-this.x,u.y-this.y);
                        if(d<120) u.hp-=this.damage*1.2;
                    }
                });
                this.effect="fire";
                this.mana-=30;
                this.abilityCooldown=this.abilityCooldownMax;
            }

            // Heal
            if(this.ability === "heal"){
                this.hp+=this.maxHp*0.35;
                if(this.hp>this.maxHp) this.hp=this.maxHp;
                this.effect="heal";
                this.mana-=25;
                this.abilityCooldown=this.abilityCooldownMax;
            }

            // Shield
            if(this.ability === "shield"){
                this.defense += 6;
                this.effectTimer = 180;
                this.effect = "shield";
                this.mana -= 20;
                this.abilityCooldown = this.abilityCooldownMax;
            }

            // Poison aura
            if(this.ability === "poisonAura"){
                units.forEach(u=>{
                    if(u.team!==this.team){
                        let d=Math.hypot(u.x-this.x,u.y-this.y);
                        if(d<60) u.poisonTicks = Math.max(u.poisonTicks, 80);
                    }
                });
                this.effect="poison";
                this.mana-=10;
                this.abilityCooldown=60;
            }

            // Rage (active)
            if(this.ability === "rage"){
                this.damage *= 1.25;
                this.speed *= 1.15;
                this.effectTimer=180;
                this.effect="rage";
                this.mana-=20;
                this.abilityCooldown=this.abilityCooldownMax;
            }

            // Blink
            if(this.ability === "blink"){
                this.x += (Math.random()*120-60);
                this.y += (Math.random()*120-60);
                this.effect="blink";
                this.mana-=15;
                this.abilityCooldown=this.abilityCooldownMax;
            }

            // Summon copy
            if(this.ability === "summon"){
                units.push(new Unit(this.x+20,this.y,this.team,{
                    name:this.name+" (clone)", emoji:this.emoji, hp:this.maxHp*0.6, damage:this.damage*0.8, speed:this.speed*0.9, defense:this.defense, accuracy:this.accuracy, attackSpeed:this.attackSpeed, range:this.range, crit:this.crit, iq:this.iq, magicArmor:this.magicArmor, weapon:this.weapon, type:this.type
                }));
                this.effect="summon";
                this.mana-=40;
                this.abilityCooldown=this.abilityCooldownMax;
            }

        }

        // death/rebirth check
        if(this.hp <= 0){
            if(this.ability === "rebirth" && !this.rebirthed){
                this.hp = this.maxHp * 0.6;
                this.rebirthed = true;
            }
        }

        if(this.attackCooldown > 0) this.attackCooldown--;
    }

    draw(){
        // effects visual
        if(this.effect === "fire"){
            ctx.fillStyle = "rgba(255,120,20,0.12)";
            ctx.beginPath();
            ctx.arc(this.x,this.y,18,0,Math.PI*2);
            ctx.fill();
        }
        if(this.effect === "heal"){
            ctx.fillStyle = "rgba(120,255,120,0.12)";
            ctx.beginPath();
            ctx.arc(this.x,this.y,16,0,Math.PI*2);
            ctx.fill();
        }
        if(this.effect === "shield"){
            ctx.strokeStyle = "rgba(80,220,255,0.9)";
            ctx.beginPath();
            ctx.arc(this.x,this.y,20,0,Math.PI*2);
            ctx.stroke();
        }
        if(this.effect === "poison"){
            ctx.strokeStyle = "rgba(160,80,200,0.9)";
            ctx.beginPath();
            ctx.arc(this.x,this.y,22,0,Math.PI*2);
            ctx.stroke();
        }

        // glow depending on team
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.team === "blue" ? "cyan" : "red";
        ctx.font = this.size + "px Arial";
        ctx.textAlign = "center";
        // draw emoji + weapon side-by-side
        ctx.fillText(this.emoji + this.weapon, this.x, this.y);
        ctx.restore();

        // HP bar
        let hpRatio = Math.max(0, this.hp) / Math.max(1, this.maxHp);
        ctx.fillStyle = "#333";
        ctx.fillRect(this.x - 22, this.y - 30, 44, 6);
        ctx.fillStyle = hpRatio>0.5?"green":(hpRatio>0.2?"orange":"red");
        ctx.fillRect(this.x - 22, this.y - 30, 44 * hpRatio, 6);

        // mana bar
        if(this.manaMax>0){
            ctx.fillStyle = "#113";
            ctx.fillRect(this.x-22,this.y-22,44,4);
            ctx.fillStyle = "cyan";
            ctx.fillRect(this.x-22,this.y-22,44*(this.mana/this.manaMax),4);
        }

        // cooldown visual overlay (on top of HP bar)
        if(this.ability && this.abilityCooldown > 0){
            let pct = this.abilityCooldown/this.abilityCooldownMax;
            ctx.fillStyle = "rgba(0,0,0,0.45)";
            ctx.fillRect(this.x-22,this.y-30,44*pct,6);
        }

        // Small stats above or below
        ctx.fillStyle = "white";
        ctx.font = "10px Arial";
        ctx.fillText(this.name, this.x, this.y + 26);

        // show element type
        ctx.fillStyle = "#aaa";
        ctx.font = "9px Arial";
        ctx.fillText(this.type, this.x, this.y + 36);

        // ability icon
        if(this.ability){
            const map = {
                fireball: '🔥', heal:'💚', shield:'🛡', poisonAura:'☠️', rage:'💢', blink:'✨', summon:'👥', splash:'💥', lifesteal:'❤️', thorns:'🌵', multiattack:'🌀', knockback:'↪️', curse:'🔮', poison:'☠️', regen:'🌿', rebirth:'🌟', fear:'😱', ambush:'🎯', split:'🔀', smite:'⚡'
            };
            let icon = map[this.ability] || '✨';
            ctx.font = "11px Arial";
            ctx.fillStyle = "yellow";
            ctx.fillText(icon, this.x, this.y - 36);
        }
    }
}

/* canvas placement */
canvas.onclick = function(e){
    if(!selectedUnit || battleStarted) return;

    const rect = canvas.getBoundingClientRect();

    // corregir escala real del canvas
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    units.push(new Unit(x, y, currentTeam, selectedUnit));
};

function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // update and draw
    units.forEach(u => u.update());
    units = units.filter(u => u.hp > 0);
    units.forEach(u => u.draw());
    requestAnimationFrame(gameLoop);
}
gameLoop();

function startBattle(){
    battleStarted = true;
    closeCreator();
}

function clearUnits(){
    units = [];
    battleStarted = false;
}

/* Creator open/close & emoji grid */
function openCreator(){
    if(battleStarted) return;
    document.getElementById("creatorPanel").style.display = "block";
    loadEmojiGrid();
}

function closeCreator(){
    document.getElementById("creatorPanel").style.display = "none";
}

function loadEmojiGrid(){
    const grid = document.getElementById("emojiGrid");
    grid.innerHTML = "";
    const search = document.getElementById("searchEmoji").value.toLowerCase();
    const category = document.getElementById("categoryFilter").value;

    emojiData.forEach(e=>{
        // category filter: if selected "all" allow all
        if(category !== "all" && e.cat !== category) return;
        // search: check emoji string (simple)
        if(search && !e.emoji.includes(search)) return;

        const div = document.createElement("div");
        div.className = "emojiOption";
        div.textContent = e.emoji;
        if(e.emoji === selectedEmoji) div.classList.add("emojiSelected");
        div.onclick = ()=>{
            selectedEmoji = e.emoji;
            loadEmojiGrid();
        };
        div.ondblclick = ()=>{
            // toggle favorite
            if(favorites.includes(e.emoji)) favorites = favorites.filter(f=>f!==e.emoji);
            else favorites.push(e.emoji);
            loadEmojiGrid();
        };
        grid.appendChild(div);
    });
}

/* random emoji */
function randomEmoji(){
    let r = emojiData[Math.floor(Math.random() * emojiData.length)];
    selectedEmoji = r.emoji;
    loadEmojiGrid();
}

/* create custom unit (reads all new stats) */
function createCustomUnit(){
    if(battleStarted) return;

    const name = document.getElementById("unitName").value || "Custom";
    const hp = parseFloat(document.getElementById("hpInput").value) || 100;
    const damage = parseFloat(document.getElementById("damageInput").value) || 10;
    const speed = parseFloat(document.getElementById("speedInput").value) || 1;
    const defense = parseFloat(document.getElementById("defenseInput").value) || 0;
    const accuracy = parseFloat(document.getElementById("accuracyInput").value);
    const attackSpeed = parseFloat(document.getElementById("attackSpeedInput").value) || 1;
    const range = parseFloat(document.getElementById("rangeInput").value) || 20;
    const crit = parseFloat(document.getElementById("critInput").value) || 0;
    const iq = parseFloat(document.getElementById("iqInput").value) || 1;
    const magicArmor = parseFloat(document.getElementById("magicArmorInput").value) || 0;

    // NUEVOS SELECTORES
    const unitType = document.getElementById("typeSelect").value || "neutral";
    const weapon = document.getElementById("weaponSelect").value || "";

    // Habilidad / mana / cooldown
    const ability = document.getElementById("abilitySelect").value || "";
    const mana = parseFloat(document.getElementById("manaInput").value) || 0;
    const abilityCd = parseFloat(document.getElementById("cooldownInput").value) || 5;

    // push into templates (baseUnits)
    baseUnits.push({
        name: name,
        emoji: selectedEmoji,
        hp: hp,
        damage: damage,
        speed: speed,
        defense: defense,
        accuracy: isNaN(accuracy) ? 90 : accuracy,
        attackSpeed: attackSpeed,
        range: range,
        crit: crit,
        iq: iq,
        magicArmor: magicArmor,
        weapon: weapon,
        type: unitType,
        ability: ability,
        mana: mana,
        abilityCooldown: abilityCd
    });

    updateUnitButtons();
    closeCreator();
}

/* wire up creator controls */
document.getElementById("categoryFilter").onchange = loadEmojiGrid;
document.getElementById("searchEmoji").oninput = loadEmojiGrid;

/* initialize */
loadEmojiGrid();
updateUnitButtons();

</script>

/* ===== PARCHE: aplicar stats de armas al crear unidad ===== */
if(typeof createCustomUnit === "function"){

        try{

            const last = window.baseUnits?.[window.baseUnits.length-1];

                last.damage += w.damage;
                last.speed  *= w.speed;
                last.range   = Math.max(last.range||0, w.range);
            }
        }catch(e){}

/* ===== PARCHE: habilidades extra en runtime ===== */
function handleExtraAbilities(u, units){
    if(!u.ability || u.mana<20 || u.abilityCooldown>0) return;

    switch(u.ability){

        case "meteor":
            units.forEach(t=>{
                if(t.team!==u.team){
                    const d=Math.hypot(t.x-u.x,t.y-u.y);
                    if(d<160) t.hp-=u.damage*1.8;
                }
            });
            u.effect="fire"; u.mana-=40; u.abilityCooldown=u.abilityCooldownMax; break;

        case "chain":
            let hits=0;
            units.forEach(t=>{
                if(t.team!==u.team && hits<3){
                    t.hp-=u.damage*1.1; hits++;
                }
            });
            u.effect="shock"; u.mana-=25; u.abilityCooldown=u.abilityCooldownMax; break;

        case "freeze":
            units.forEach(t=>{
                if(t.team!==u.team){
                    const d=Math.hypot(t.x-u.x,t.y-u.y);
                    if(d<90) t.speed*=0.5;
                }
            });
            u.effect="ice"; u.mana-=30; u.abilityCooldown=u.abilityCooldownMax; break;

        case "vampireAura":
            units.forEach(t=>{
                if(t.team!==u.team){
                    const d=Math.hypot(t.x-u.x,t.y-u.y);
                    if(d<70){
                        t.hp-=0.4;
                        u.hp+=0.4;
                    }
                }
            });
            u.effect="dark"; u.mana-=10; u.abilityCooldown=40; break;

        case "storm":
            units.forEach(t=>{
                if(t.team!==u.team){
                    const dx=t.x-u.x, dy=t.y-u.y;
                    const m=Math.hypot(dx,dy)||1;
                    t.x+=(dx/m)*8; t.y+=(dy/m)*8;
                }
            });
            u.effect="wind"; u.mana-=22; u.abilityCooldown=u.abilityCooldownMax; break;

        case "earthquake":
            units.forEach(t=>{
                if(t.team!==u.team){
                    const d=Math.hypot(t.x-u.x,t.y-u.y);
                    if(d<120) t.hp-=u.damage*1.3;
                }
            });
            u.effect="dust"; u.mana-=35; u.abilityCooldown=u.abilityCooldownMax; break;

        case "timeSlow":
            units.forEach(t=>{ if(t.team!==u.team) t.speed*=0.7; });
            u.effect="time"; u.mana-=28; u.abilityCooldown=u.abilityCooldownMax; break;

        case "holyLight":
            units.forEach(t=>{
                if(t.team===u.team){
                    const d=Math.hypot(t.x-u.x,t.y-u.y);
                    if(d<110) t.hp+=0.8;
                }
            });
            u.effect="heal"; u.mana-=26; u.abilityCooldown=u.abilityCooldownMax; break;

                units.push(new Unit(u.x+Math.random()*30,u.y,u.team,u));

            u.effect="dark"; u.mana-=45; u.abilityCooldown=u.abilityCooldownMax; break;

        case "laser":
            units.forEach(t=>{ if(t.team!==u.team) t.hp-=u.damage*0.9; });
            u.effect="laser"; u.mana-=24; u.abilityCooldown=u.abilityCooldownMax; break;

        case "bomb":

            u.effect="fire"; u.mana-=32; u.abilityCooldown=u.abilityCooldownMax; break;

        case "windDash":

            u.effect="ice"; u.mana-=26; u.abilityCooldown=u.abilityCooldownMax; break;

}
