<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TABS Emoji PRO</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
}

#leftPanel{
    width:260px;
    background:#1b1b1b;
    padding:10px;
    box-sizing:border-box;
}

.buttonGrid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:3px;
    margin-bottom:6px;
}

.unitBtn,.controlBtn{
    background:#333;
    border:none;
    border-radius:5px;
    cursor:pointer;
    padding:2px;
    height:48px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:0.2s;
    color:white;
}
.unitBtn:hover,.controlBtn:hover{ background:#555; }

.unitEmoji{ font-size:16px; line-height:16px; }
.unitText{ font-size:8px;margin-top:2px;text-align:center;color:#ccc; }

canvas{ background:#222; flex:1; }

#creatorPanel{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1b1b1b;
    padding:15px;
    display:none;
    width:380px;
    border:2px solid #555;
    max-height:90vh;
    overflow:auto;
}

input,select{
    width:100%;
    margin:4px 0;
    padding:5px;
    background:#222;
    color:white;
    border:1px solid #444;
    box-sizing:border-box;
}

.crLabel{ font-size:12px;margin-top:6px;color:#ddd;display:block; }
</style>
</head>
<body>

<div id="leftPanel">
<h3>Unidades</h3>
<div id="unitButtons" class="buttonGrid"></div>

<h3>Controles</h3>
<div class="buttonGrid">
<button class="controlBtn" onclick="toggleTeam()" id="teamBtn">🔵<div class="unitText">Bando</div></button>
<button class="controlBtn" onclick="startBattle()">▶️<div class="unitText">Start</div></button>
<button class="controlBtn" onclick="clearUnits()">🗑<div class="unitText">Limpiar</div></button>
<button class="controlBtn" onclick="openCreator()">➕<div class="unitText">Crear</div></button>
</div>
</div>

<canvas id="game" width="900" height="600"></canvas>

<div id="creatorPanel">
<h3>Creador</h3>

<label class="crLabel">Nombre</label>
<input id="unitName">

<label class="crLabel">Emoji base</label>
<input id="emojiInput" value="😀">

<hr>

<h4>🎨 Sprite Pixel Art</h4>

<canvas id="pixelCanvas" width="192" height="192"
style="border:2px solid #555;background:white;image-rendering:pixelated;"></canvas>

<label class="crLabel">Color</label>
<input type="color" id="pixelColor" value="#ff0000">

<label class="crLabel">Tamaño pixel</label>
<select id="pixelSize">
<option value="6">Pequeño</option>
<option value="12" selected>Medio</option>
<option value="24">Grande</option>
</select>

<div style="display:flex;gap:6px;margin-top:6px">
<button onclick="clearPixelCanvas()">Borrar</button>
<button onclick="savePixelSprite()">Guardar Sprite</button>
</div>

<hr>

<label class="crLabel">❤️ HP</label>
<input id="hpInput" type="number" value="100">

<label class="crLabel">⚔️ Daño</label>
<input id="damageInput" type="number" value="10">

<label class="crLabel">🏃 Velocidad</label>
<input id="speedInput" type="number" value="1" step="0.1">

<button onclick="createCustomUnit()">Crear</button>
<button onclick="closeCreator()">Cerrar</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let units=[];
let baseUnits=[];
let selectedUnit=null;
let currentTeam="blue";
let battleStarted=false;

/* ===== PIXEL EDITOR ===== */
const pixelCanvas=document.getElementById("pixelCanvas");
const pctx=pixelCanvas.getContext("2d");
let drawing=false;
let customSprite=null;

pixelCanvas.onmousedown=()=>drawing=true;
pixelCanvas.onmouseup=()=>drawing=false;
pixelCanvas.onmouseleave=()=>drawing=false;
pixelCanvas.onmousemove=e=>{
    if(!drawing) return;
    const rect=pixelCanvas.getBoundingClientRect();
    const size=parseInt(pixelSize.value);
    const x=Math.floor((e.clientX-rect.left)/size)*size;
    const y=Math.floor((e.clientY-rect.top)/size)*size;
    pctx.fillStyle=pixelColor.value;
    pctx.fillRect(x,y,size,size);
};

function clearPixelCanvas(){
    pctx.clearRect(0,0,pixelCanvas.width,pixelCanvas.height);
    customSprite=null;
}
function savePixelSprite(){
    customSprite=pixelCanvas.toDataURL();
    alert("Sprite guardado");
}

/* ===== UI ===== */
function openCreator(){ creatorPanel.style.display="block"; }
function closeCreator(){ creatorPanel.style.display="none"; }

function toggleTeam(){
    currentTeam=currentTeam==="blue"?"red":"blue";
    teamBtn.innerHTML=(currentTeam==="blue"?"🔵":"🔴")+'<div class="unitText">Bando</div>';
}

function createCustomUnit(){
    const u={
        name:unitName.value||"Custom",
        emoji:emojiInput.value||"😀",
        sprite:customSprite||null,
        hp:+hpInput.value,
        damage:+damageInput.value,
        speed:+speedInput.value
    };
    baseUnits.push(u);
    updateUnitButtons();
}

function updateUnitButtons(){
    unitButtons.innerHTML="";
    baseUnits.forEach(u=>{
        let b=document.createElement("button");
        b.className="unitBtn";
        b.innerHTML=`<div class="unitEmoji">${u.emoji}</div>
                     <div class="unitText">${u.name}</div>`;
        b.onclick=()=>selectedUnit=u;
        unitButtons.appendChild(b);
    });
}

/* ===== UNIT CLASS ===== */
class Unit{
constructor(x,y,team,data){
    Object.assign(this,data);
    this.x=x;
    this.y=y;
    this.team=team;
    this.maxHp=this.hp;
    this.cool=0;
}

update(){
    if(!battleStarted) return;
    let enemy=units.find(u=>u.team!==this.team);
    if(!enemy) return;

    let dx=enemy.x-this.x;
    let dy=enemy.y-this.y;
    let d=Math.hypot(dx,dy);

    if(d>30){
        this.x+=dx/d*this.speed;
        this.y+=dy/d*this.speed;
    }else if(this.cool<=0){
        enemy.hp-=this.damage;
        this.cool=40;
    }
    if(this.cool>0) this.cool--;
}

draw(){
    ctx.save();
    ctx.textAlign="center";
    ctx.font="22px Arial";

    if(this.sprite){
        if(!this.img){
            this.img=new Image();
            this.img.src=this.sprite;
        }
        ctx.drawImage(this.img,this.x-18,this.y-18,36,36);
    }else{
        ctx.fillText(this.emoji,this.x,this.y);
    }

    ctx.restore();

    let r=this.hp/this.maxHp;
    ctx.fillStyle="#333";
    ctx.fillRect(this.x-20,this.y-30,40,5);
    ctx.fillStyle="lime";
    ctx.fillRect(this.x-20,this.y-30,40*r,5);
}
}

/* ===== CANVAS CLICK ===== */
canvas.onclick=e=>{
    if(!selectedUnit||battleStarted) return;
    const r=canvas.getBoundingClientRect();
    units.push(new Unit(
        e.clientX-r.left,
        e.clientY-r.top,
        currentTeam,
        selectedUnit
    ));
};

function clearUnits(){ units=[]; battleStarted=false; }
function startBattle(){ battleStarted=true; }

/* ===== LOOP ===== */
function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    units.forEach(u=>u.update());
    units=units.filter(u=>u.hp>0);
    units.forEach(u=>u.draw());
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
