<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TABS RPG - PERSISTENCE EDITION</title>
    <style>
        :root { --primary: #007bff; --accent: #6f42c1; --bg: #090909; --panel: #151515; --border: #333; --danger: #ff4444; --success: #28a745; --warning: #ffc107; --proj: #e67e22; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #leftPanel { width: 340px; background: var(--panel); padding: 15px; border-right: 1px solid var(--border); overflow-y: auto; z-index: 10; }
        .section-title { font-size: 10px; text-transform: uppercase; color: var(--primary); margin: 15px 0 8px 0; border-bottom: 1px solid var(--border); letter-spacing: 1px; font-weight: bold; }
        
        .buttonGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .unitBtn { background: #222; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; height: 65px; display: flex; align-items: center; justify-content: center; position: relative; }
        .unitBtn.selected { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,123,255,0.3); }
        .unitBtn img { image-rendering: pixelated; width: 80%; height: 80%; object-fit: contain; pointer-events: none; }

        .context-menu { display: none; position: fixed; background: #252525; border: 1px solid #444; border-radius: 6px; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); min-width: 140px; }
        .context-item { padding: 10px 15px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .context-item:hover { background: #333; }

        #gameContainer { flex: 1; position: relative; background: #000; }
        canvas#game { display: block; width: 100%; height: 100%; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #181818; padding: 25px; border: 1px solid var(--border); border-radius: 12px; width: 950px; }
        .modal-content.small { width: 450px; }

        .editor-layout { display: grid; grid-template-columns: 420px 1fr; gap: 25px; }
        canvas.pixel-canvas { image-rendering: pixelated; background-color: #1a1a1a; border: 2px solid #000; cursor: crosshair; }
        
        .tools { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .tool-btn { background: #333; border: 1px solid #444; color: white; padding: 8px; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .tool-btn.active { background: var(--primary); }

        .gallery-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-height: 120px; overflow-y: auto; background: #111; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .gallery-item { border: 1px solid #444; height: 50px; cursor: pointer; background: #222; overflow: hidden; }
        .gallery-item img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

        .stats-box { background: #222; padding: 15px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 400px; overflow-y: auto; }
        input, select { background: #000; border: 1px solid #444; color: #0f0; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn-main { color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    </style>
</head>
<body onclick="hideMenus()">

<div id="unitMenu" class="context-menu">
    <div class="context-item" onclick="editUnit()">✏️ Editar</div>
    <div class="context-item" onclick="exportUnit()">📥 Exportar JSON</div>
    <div class="context-item" onclick="deleteBaseUnit()" style="color:var(--danger)">🗑️ Borrar Permanente</div>
</div>

<div id="leftPanel">
    <div class="section-title">Tropas y Estructuras</div>
    <div id="unitButtons" class="buttonGrid"></div>
    
    <div class="section-title">Controles</div>
    <div class="buttonGrid">
        <button class="unitBtn" onclick="toggleTeam()" id="teamBtn">🔵 Equipo</button>
        <button class="unitBtn" onclick="startBattle()" style="color:var(--success)">▶ Play</button>
        <button class="unitBtn" onclick="clearUnits()" style="color:var(--danger)">🗑 Clear</button>
        <button class="unitBtn" onclick="openCreator()" style="color:var(--primary)">➕ Nuevo</button>
    </div>
    <button class="btn-main" style="background:var(--accent); margin-top:10px;" onclick="openSkillModal()">⭐ CREAR SKILL</button>
    <button class="btn-main" style="background:var(--proj); margin-top:5px;" onclick="openProjCreator()">🏹 CREAR PROYECTIL</button>
    
    <div class="section-title">Copia de Seguridad</div>
    <button class="btn-main" style="background:#444;" onclick="downloadBackup()">📥 DESCARGAR BACKUP</button>
    <button class="btn-main" style="background:#444;" onclick="document.getElementById('importInput').click()">📤 CARGAR BACKUP</button>
    <input type="file" id="importInput" style="display:none" onchange="importBackup(this)">
    
    <button class="btn-main" style="background:var(--danger); margin-top:20px; font-size: 10px;" onclick="resetStorage()">⚠️ BORRAR TODO EL JUEGO</button>
</div>

<div id="gameContainer"><canvas id="game"></canvas></div>

<div id="skillPanel" class="modal" onclick="event.stopPropagation()">
    <div class="modal-content small">
        <h2>Advanced Skill Editor</h2>
        <div style="background: #222; padding: 15px; border-radius: 8px;">
            <label>Nombre</label><input type="text" id="skName">
            <label>Trigger</label>
            <select id="skTrigger">
                <option value="attack">Al Atacar</option>
                <option value="death">Al Morir</option>
                <option value="contact">Al Tocar Enemigo</option>
                <option value="hurt">Al Recibir Daño</option>
                <option value="spawn">Al Aparecer</option>
            </select>
            <label>Efecto</label>
            <select id="skEffect">
                <option value="damage">💥 Daño Área</option>
                <option value="heal">💚 Curar Aliados</option>
                <option value="push">🚀 Empuje</option>
                <option value="freeze">❄️ Congelar</option>
                <option value="teleport">✨ Teleport</option>
                <option value="vampire">🧛 Robo Vida</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <div><label>Potencia</label><input type="number" id="skPower" value="60"></div>
                <div><label>Radio</label><input type="number" id="skRange" value="100"></div>
            </div>
            <button class="btn-main" style="background:var(--accent); margin-top:15px;" onclick="createSkill()">⭐ GUARDAR SKILL</button>
            <button onclick="closeModals()" style="width:100%; margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cancelar</button>
        </div>
    </div>
</div>

<div id="projPanel" class="modal" onclick="event.stopPropagation()">
    <div class="modal-content">
        <div class="editor-layout">
            <div>
                <canvas id="pCanvas" class="pixel-canvas" width="384" height="384"></canvas>
                <input type="color" id="pColor" value="#ff9900" style="width:100%; margin-top:10px;">
            </div>
            <div>
                <h2 style="color:var(--proj)">Projectile Editor</h2>
                <div class="stats-box">
                    <div style="grid-column: span 2;"><label>Nombre</label><input id="pName" value="Flecha"></div>
                    <div><label>Velocidad</label><input id="pSpeed" type="number" value="7"></div>
                    <div><label>Tipo de Vuelo</label>
                        <select id="pTypeBehavior">
                            <option value="homing">Teledirigido</option>
                            <option value="direct">Directo</option>
                        </select>
                    </div>
                </div>
                <button class="btn-main" style="background:var(--proj); margin-top:20px;" onclick="saveProjectile()">💾 GUARDAR PROYECTIL</button>
                <button onclick="closeModals()" style="width:100%; margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<div id="creatorPanel" class="modal" onclick="event.stopPropagation()">
    <div class="modal-content">
        <div class="editor-layout">
            <div>
                <canvas id="uCanvas" class="pixel-canvas" width="384" height="384"></canvas>
                <div class="tools">
                    <button class="tool-btn active" onclick="setTool('pen', this, 'u')">✏️</button>
                    <button class="tool-btn" onclick="setTool('line', this, 'u')">📏</button>
                    <button class="tool-btn" onclick="setTool('rect', this, 'u')">⬜</button>
                    <button class="tool-btn" onclick="setTool('circle', this, 'u')">⭕</button>
                    <button class="tool-btn" onclick="setTool('eraser', this, 'u')">🧽</button>
                    <button class="tool-btn" onclick="setTool('fill', this, 'u')">🎨</button>
                    <button class="tool-btn" onclick="toggleMirror(this)">🌓</button>
                </div>
                <input type="color" id="uColor" value="#3498db" style="width:100%; margin-top:10px;">
                <button class="btn-main" style="background:#444; margin-top:10px;" onclick="saveToGallery()">💾 GUARDAR BOCETO</button>
            </div>
            <div>
                <h2 style="margin:0; color:var(--primary)">Configurar Entidad</h2>
                <div class="stats-box">
                    <div style="grid-column: span 2;"><label>Nombre</label><input id="uName"></div>
                    <div><label>Tipo</label><select id="uType"><option value="melee">Melee</option><option value="range">Arquero</option><option value="turret">Torreta</option></select></div>
                    <div><label>Skill</label><select id="uSkillSelect"></select></div>
                    <div><label>🏹 Proyectil</label><select id="uProjSelect"></select></div>
                    <div class="section-title" style="grid-column: span 2;">Combate</div>
                    <div><label>❤️ HP</label><input id="uHp" type="number" value="100"></div>
                    <div><label>⚔️ Daño</label><input id="uAtk" type="number" value="15"></div>
                    <div><label>🛡️ Def</label><input id="uDef" type="number" value="0"></div>
                    <div><label>⏱️ Atk Spd</label><input id="uAtkSpd" type="number" value="60"></div>
                    <div class="section-title" style="grid-column: span 2;">Físicas</div>
                    <div><label>🏃 Spd</label><input id="uSpd" type="number" value="1.5" step="0.1"></div>
                    <div><label>📏 Size</label><input id="uSize" type="number" value="40"></div>
                </div>
                <div id="uGallery" class="gallery-grid"></div>
                <button id="saveMainBtn" class="btn-main" onclick="saveUnit(false)" style="background:var(--success); margin-top:10px;">GUARDAR ENTIDAD</button>
                <button id="updateBtn" class="btn-main" onclick="saveUnit(true)" style="background:var(--primary); display:none;">ACTUALIZAR</button>
                <button onclick="closeModals()" style="width:100%; margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cerrar sin guardar</button>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
let baseUnits = [], unitsOnMap = [], customSkills = [], customProjectiles = [], projectiles = [], particles = [], drawingGallery = [];
let selectedUnit = null, currentTeam = "blue", battleStarted = false, drawing = false;
let currentTool = 'pen', isMirror = false, pSize = 24, editingIndex = -1, rightClickedBaseIndex = -1;

// --- SISTEMA DE PERSISTENCIA DEFINITIVA ---
function saveToLocalStorage() {
    const gameState = {
        units: baseUnits,
        skills: customSkills,
        projs: customProjectiles,
        gallery: drawingGallery
    };
    localStorage.setItem('TABS_RPG_DATA', JSON.stringify(gameState));
}

function loadFromLocalStorage() {
    const data = localStorage.getItem('TABS_RPG_DATA');
    if (data) {
        const parsed = JSON.parse(data);
        baseUnits = parsed.units || [];
        customSkills = parsed.skills || [];
        customProjectiles = parsed.projs || [];
        drawingGallery = parsed.gallery || [];
        updateUI();
        renderSelectors();
        renderGallery();
    }
}

function downloadBackup() {
    const data = localStorage.getItem('TABS_RPG_DATA');
    if(!data) return alert("No hay datos para guardar");
    const blob = new Blob([data], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tabs_rpg_backup.json';
    a.click();
}

function importBackup(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        localStorage.setItem('TABS_RPG_DATA', e.target.result);
        location.reload();
    };
    reader.readAsText(file);
}

function resetStorage() { 
    if(confirm("¿ESTÁS SEGURO? Se borrarán todos tus dibujos, unidades y skills para siempre.")) { 
        localStorage.clear(); 
        location.reload(); 
    } 
}

// --- MOTOR DIBUJO ---
function setupAdvancedEditor(canvasId, colorId) {
    const cv = document.getElementById(canvasId), cx = cv.getContext("2d");
    let startX, startY;
    cv.onmousedown = (e) => {
        drawing = true; const r = cv.getBoundingClientRect();
        startX = Math.floor((e.clientX-r.left)/(cv.width/16))* (cv.width/16);
        startY = Math.floor((e.clientY-r.top)/(cv.height/16))* (cv.height/16);
        if(currentTool==='pen') {
            cx.fillStyle = document.getElementById(colorId).value;
            cx.fillRect(startX, startY, cv.width/16, cv.height/16);
            if(isMirror) cx.fillRect(cv.width-(startX+cv.width/16), startY, cv.width/16, cv.height/16);
        }
        if(currentTool==='fill') { cx.fillStyle = document.getElementById(colorId).value; cx.fillRect(0,0,cv.width,cv.height); }
    };
    cv.onmousemove = (e) => {
        if(!drawing || currentTool !== 'pen' && currentTool !== 'eraser') return;
        const r = cv.getBoundingClientRect();
        const x = Math.floor((e.clientX-r.left)/(cv.width/16))* (cv.width/16);
        const y = Math.floor((e.clientY-r.top)/(cv.height/16))* (cv.height/16);
        cx.fillStyle = currentTool === 'eraser' ? 'rgba(0,0,0,0)' : document.getElementById(colorId).value;
        if(currentTool === 'eraser') cx.clearRect(x,y,cv.width/16,cv.height/16);
        else {
            cx.fillRect(x,y,cv.width/16,cv.height/16);
            if(isMirror) cx.fillRect(cv.width-(x+cv.width/16), y, cv.width/16, cv.height/16);
        }
    };
    cv.onmouseup = (e) => {
        if(!drawing) return;
        const r = cv.getBoundingClientRect();
        const endX = Math.floor((e.clientX-r.left)/(cv.width/16))* (cv.width/16);
        const endY = Math.floor((e.clientY-r.top)/(cv.height/16))* (cv.height/16);
        cx.fillStyle = document.getElementById(colorId).value;
        if(currentTool === 'rect') cx.fillRect(startX, startY, endX-startX+cv.width/16, endY-startY+cv.width/16);
        drawing = false;
    };
}
setupAdvancedEditor("uCanvas", "uColor");
setupAdvancedEditor("pCanvas", "pColor");

// --- CLASES ---
class Projectile {
    constructor(x, y, target, data, team, parent) {
        this.x = x; this.y = y; this.target = target; this.team = team; this.parent = parent;
        this.img = new Image(); this.img.src = data.sprite;
        this.speed = data.speed; this.behavior = data.behavior || "homing";
        this.damage = parent.atk; this.dead = false;
        let dx = target.x-x, dy = target.y-y; let dist = Math.hypot(dx,dy);
        this.vx = (dx/dist)*this.speed; this.vy = (dy/dist)*this.speed; this.angle = Math.atan2(dy,dx);
    }
    update() {
        if(this.behavior==="homing"){
            if(this.target.dead) { this.dead=true; return; }
            let dx = this.target.x-this.x, dy = this.target.y-this.y; let d = Math.hypot(dx,dy);
            this.angle = Math.atan2(dy,dx);
            if(d<15){ this.target.takeDamage(this.damage); this.dead=true; }
            else { this.x+=(dx/d)*this.speed; this.y+=(dy/d)*this.speed; }
        } else {
            this.x+=this.vx; this.y+=this.vy;
            let target = unitsOnMap.find(u => u.team!==this.team && !u.dead && Math.hypot(u.x-this.x, u.y-this.y)<20);
            if(target){ target.takeDamage(this.damage); this.dead=true; }
            if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.dead=true;
        }
    }
    draw() { ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle); ctx.drawImage(this.img,-10,-10,20,20); ctx.restore(); }
}

class Entity {
    constructor(x, y, team, data) {
        Object.assign(this, data);
        this.x = x; this.y = y; this.team = team; this.curHp = this.hp;
        this.img = new Image(); this.img.src = this.sprite;
        this.cool = 0; this.dead = false; this.flash = 0; this.frozen = 0;
        this.trigger('spawn');
    }
    takeDamage(amount) {
        if(this.dead) return;
        let finalDmg = Math.max(1, amount - (this.def || 0));
        this.curHp -= finalDmg; this.flash = 10;
        this.trigger('hurt');
        if(this.curHp <= 0) { 
            this.dead = true; this.trigger('death');
            for(let i=0; i<12; i++) particles.push({x:this.x, y:this.y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, l:1, c:this.team=="blue"?"#007bff":"#f00"});
        }
    }
    trigger(type) {
        if (!this.skillId || this.skillId === "none") return;
        const sk = customSkills.find(s => s.id == this.skillId);
        if(!sk || sk.trigger !== type) return;
        unitsOnMap.forEach(t => {
            if(!t || t.dead) return;
            if(Math.hypot(t.x-this.x, t.y-this.y) < sk.range) {
                if(t.team !== this.team) {
                    if(sk.effect==='damage') t.takeDamage(sk.power);
                    if(sk.effect==='push') { let a=Math.atan2(t.y-this.y, t.x-this.x); t.x+=Math.cos(a)*sk.power/5; t.y+=Math.sin(a)*sk.power/5; }
                    if(sk.effect==='freeze') { t.frozen = 100; }
                } else if(sk.effect==='heal') t.curHp = Math.min(t.hp, t.curHp + sk.power/2);
            }
        });
        if(type==='contact') this.takeDamage(999);
    }
    update() {
        if(!battleStarted || this.dead) return;
        if(this.frozen > 0) { this.frozen--; return; }
        let enemies = unitsOnMap.filter(u => u.team !== this.team && !u.dead);
        if(!enemies.length) return;
        let target = enemies.reduce((p, c) => Math.hypot(c.x-this.x, c.y-this.y) < Math.hypot(p.x-this.x, p.y-this.y) ? c : p);
        let d = Math.hypot(target.x-this.x, target.y-this.y);
        let range = this.type === 'melee' ? 45 : 280;
        if(d > range) { this.x += (target.x-this.x)/d * this.spd; this.y += (target.y-this.y)/d * this.spd; if(d<30) this.trigger('contact'); }
        else if(this.cool <= 0) {
            this.trigger('attack');
            if(this.type === 'melee') target.takeDamage(this.atk);
            else {
                let pData = customProjectiles.find(p => p.id == this.projId) || {sprite: "", speed: 5, behavior: "homing"};
                projectiles.push(new Projectile(this.x, this.y, target, pData, this.team, this));
            }
            this.cool = this.atkSpd || 60;
        }
        if(this.cool > 0) this.cool--; if(this.flash > 0) this.flash--;
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y); if(this.team === "red") ctx.scale(-1, 1);
        if(this.flash > 0) ctx.filter = "brightness(3)";
        ctx.drawImage(this.img, -this.size/2, -this.size/2, this.size, this.size); ctx.restore();
        if(!this.dead) { ctx.fillStyle = "red"; ctx.fillRect(this.x-15, this.y-this.size/2-10, 30*(this.curHp/this.hp), 4); }
    }
}

// --- LOGICA UI ---
function saveUnit(isUpdate) {
    const data = {
        name: document.getElementById("uName").value,
        sprite: document.getElementById("uCanvas").toDataURL(),
        type: document.getElementById("uType").value,
        hp: +document.getElementById("uHp").value,
        atk: +document.getElementById("uAtk").value,
        def: +document.getElementById("uDef").value,
        atkSpd: +document.getElementById("uAtkSpd").value,
        spd: +document.getElementById("uSpd").value,
        size: +document.getElementById("uSize").value,
        projId: document.getElementById("uProjSelect").value,
        skillId: document.getElementById("uSkillSelect").value
    };
    if(isUpdate && editingIndex > -1) baseUnits[editingIndex] = data; else baseUnits.push(data);
    updateUI(); closeModals(); saveToLocalStorage();
}
function saveProjectile() {
    customProjectiles.push({ id: Date.now(), name: document.getElementById("pName").value, sprite: document.getElementById("pCanvas").toDataURL(), speed: +document.getElementById("pSpeed").value, behavior: document.getElementById("pTypeBehavior").value });
    renderSelectors(); closeModals(); saveToLocalStorage();
}
function createSkill() {
    customSkills.push({ id: Date.now(), name: document.getElementById("skName").value, trigger: document.getElementById("skTrigger").value, effect: document.getElementById("skEffect").value, power: +document.getElementById("skPower").value, range: +document.getElementById("skRange").value });
    renderSelectors(); closeModals(); saveToLocalStorage();
}
function saveToGallery() { drawingGallery.push({ img: document.getElementById("uCanvas").toDataURL() }); renderGallery(); saveToLocalStorage(); }

function updateUI() {
    const ub = document.getElementById("unitButtons"); ub.innerHTML = "";
    baseUnits.forEach((u, i) => {
        const b = document.createElement("div"); b.className = "unitBtn"; b.dataset.index = i; b.innerHTML = `<img src="${u.sprite}">`;
        b.onclick = () => { selectedUnit = u; document.querySelectorAll('.unitBtn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); };
        ub.appendChild(b);
    });
}
function renderSelectors() {
    const ps = document.getElementById("uProjSelect"), ss = document.getElementById("uSkillSelect");
    ps.innerHTML = '<option value="none">Sin Proyectil</option>'; ss.innerHTML = '<option value="none">Sin Skill</option>';
    customProjectiles.forEach(p => ps.innerHTML += `<option value="${p.id}">${p.name}</option>`);
    customSkills.forEach(s => ss.innerHTML += `<option value="${s.id}">${s.name}</option>`);
}
function renderGallery() { document.getElementById("uGallery").innerHTML = drawingGallery.map((d, i) => `<div class="gallery-item" onclick="loadBoceto(${i})"><img src="${d.img}"></div>`).join(''); }
function loadBoceto(i) { const img = new Image(); img.src = drawingGallery[i].img; img.onload = () => { const cx = document.getElementById("uCanvas").getContext("2d"); cx.clearRect(0,0,384,384); cx.drawImage(img,0,0); } }

// --- CONTEXT MENU ---
window.oncontextmenu = (e) => {
    e.preventDefault(); const btn = e.target.closest('.unitBtn');
    if(btn) {
        rightClickedBaseIndex = +btn.dataset.index;
        const m = document.getElementById("unitMenu"); m.style.display="block"; m.style.left=e.clientX+"px"; m.style.top=e.clientY+"px";
    }
};
function hideMenus() { document.querySelectorAll('.context-menu').forEach(m => m.style.display='none'); }
function editUnit() {
    const u = baseUnits[rightClickedBaseIndex]; editingIndex = rightClickedBaseIndex;
    document.getElementById("uName").value = u.name; 
    document.getElementById("uHp").value = u.hp;
    document.getElementById("uAtk").value = u.atk;
    document.getElementById("uType").value = u.type;
    document.getElementById("uProjSelect").value = u.projId;
    document.getElementById("uSkillSelect").value = u.skillId;
    document.getElementById("updateBtn").style.display="block"; openCreator();
    const img = new Image(); img.src = u.sprite; img.onload = () => {
        const ctxU = document.getElementById("uCanvas").getContext("2d");
        ctxU.clearRect(0,0,384,384); ctxU.drawImage(img,0,0);
    };
}
function deleteBaseUnit() { baseUnits.splice(rightClickedBaseIndex,1); updateUI(); saveToLocalStorage(); }
function exportUnit() {
    const data = JSON.stringify(baseUnits[rightClickedBaseIndex]);
    const blob = new Blob([data], {type: "application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${baseUnits[rightClickedBaseIndex].name}.json`; a.click();
}

// --- LOOP ---
function loop() {
    ctx.fillStyle = "#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
    unitsOnMap.forEach(u => { u.update(); u.draw(); });
    projectiles.forEach((p, i) => { p.update(); p.draw(); if(p.dead) projectiles.splice(i, 1); });
    particles.forEach((p, i) => { p.x+=p.vx; p.y+=p.vy; p.l-=0.02; ctx.globalAlpha = p.l; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 3, 3); if(p.l <= 0) particles.splice(i, 1); });
    ctx.globalAlpha = 1; unitsOnMap = unitsOnMap.filter(u => !u.dead); requestAnimationFrame(loop);
}

canvas.onclick = (e) => {
    if(!battleStarted && selectedUnit) {
        const r = canvas.getBoundingClientRect();
        unitsOnMap.push(new Entity(e.clientX-r.left, e.clientY-r.top, currentTeam, selectedUnit));
    }
};

function setTool(t, b) { currentTool = t; document.querySelectorAll('.tool-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); }
function toggleMirror(b) { isMirror = !isMirror; b.classList.toggle('active'); }
function openCreator() { document.getElementById("creatorPanel").style.display="block"; }
function openProjCreator() { document.getElementById("projPanel").style.display="block"; }
function openSkillModal() { document.getElementById("skillPanel").style.display="block"; }
function closeModals() { document.querySelectorAll(".modal").forEach(m => m.style.display="none"); editingIndex = -1; document.getElementById("updateBtn").style.display="none"; }
function toggleTeam() { currentTeam = currentTeam === "blue" ? "red" : "blue"; document.getElementById("teamBtn").innerText = currentTeam === "blue" ? "🔵 Equipo" : "🔴 Equipo"; }
function startBattle() { battleStarted = true; }
function clearUnits() { unitsOnMap = []; projectiles = []; particles = []; battleStarted = false; }

window.onload = () => { 
    canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; 
    loadFromLocalStorage(); // CARGA AUTOMÁTICA AL INICIAR
    loop(); 
};
</script>
</body>
</html>
